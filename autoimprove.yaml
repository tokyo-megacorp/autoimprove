project:
  name: autoimprove
  path: .

budget:
  max_experiments_per_session: 10
  max_parallel: 1  # max concurrent grind loops; overridden by dynamic scaling (1-5 based on weekly burn rate)

gates:
  - name: evaluate_tests
    command: bash test/evaluate/test-evaluate.sh
  - name: ar_effectiveness_smoke
    command: bash tests/test-ar-effectiveness.sh

# Benchmark types:
#   type: deterministic  — fast, no LLM sessions, safe to run per-experiment (default)
#   type: llm-judge      — spawns claude CLI sessions; too slow/expensive for per-experiment
#                          use. evaluate.sh skips these unless --include-llm-benchmarks is
#                          passed. Intended for periodic/weekly quality checks only.

benchmarks:
  - name: self-metrics
    type: deterministic
    command: bash benchmark/self-metrics.sh
    metrics:
      - name: test_count
        extract: "json:.test_count"
        direction: higher_is_better
        tolerance: 0.0
        significance: 0.01

      - name: broken_constraints
        extract: "json:.broken_constraints"
        direction: lower_is_better
        tolerance: 0.0
        significance: 0.0

      - name: broken_refs
        extract: "json:.broken_refs"
        direction: lower_is_better
        tolerance: 0.0
        significance: 0.0

  - name: skill-coverage
    type: deterministic
    command: |
      COUNT=$(find skills/ -name "SKILL.md" -exec grep -l ".\{50\}" {} \; | wc -l | tr -d ' ')
      TOTAL=$(find skills/ -name "SKILL.md" | wc -l | tr -d ' ')
      echo "{\"skill_doc_coverage\": $COUNT, \"skill_total\": $TOTAL}"
    metrics:
      - name: skill_doc_coverage
        extract: "json:.skill_doc_coverage"
        direction: higher_is_better
        tolerance: 0.0
        significance: 0.01

  - name: agent-completeness
    type: deterministic
    command: |
      COUNT=$(find agents/ -name "*.md" | while read f; do [ $(wc -l < "$f") -ge 20 ] && echo "$f"; done | wc -l | tr -d ' ')
      echo "{\"agent_completeness\": $COUNT}"
    metrics:
      - name: agent_completeness
        extract: "json:.agent_completeness"
        direction: higher_is_better
        tolerance: 0.0
        significance: 0.01

  - name: prompt-quality
    type: deterministic
    command: bash benchmark/self-metrics.sh
    metrics:
      - name: skill_depth
        extract: "json:.skill_depth"
        direction: higher_is_better
        tolerance: 0.0
        significance: 0.01

      - name: agent_sections
        extract: "json:.agent_sections"
        direction: higher_is_better
        tolerance: 0.0
        significance: 0.01

  - name: reliability
    command: bash benchmark/self-metrics.sh
    type: deterministic
    metrics:
      - name: revert_rate
        extract: "json:.revert_rate"
        direction: lower_is_better
        tolerance: 0.0
        significance: 0.01
        description: "Proportion of last 50 commits that are reverts (0.0 = no reverts)"

      - name: bug_escape_rate
        extract: "json:.bug_escape_rate"
        direction: lower_is_better
        tolerance: 0.0
        significance: 0.01
        description: "Open bug issues / total open issues (0.0 = no open bugs)"

      - name: ar_severity_trend
        extract: "json:.ar_severity_trend"
        direction: lower_is_better
        tolerance: 0.0
        significance: 1.0
        description: "Count of high-severity AR findings in last 3 runs (lower is better)"

      - name: fix_durability
        extract: "json:.fix_durability"
        direction: higher_is_better
        tolerance: 0.0
        significance: 0.01
        description: "Proportion of kept experiments not followed by a discard within 5 experiments (1.0 = perfect)"

  # NOTE: ar-effectiveness and matrix-effectiveness benchmarks REMOVED (2026-03-30)
  # Root cause of Run 10 (5/5 "unknown") and Run 11 (stuck).
  # These benchmarks spawn claude CLI sessions (haiku+sonnet) per experiment,
  # making them too slow (minutes), expensive (burns token pools), and
  # non-deterministic for per-experiment evaluation.
  # TODO: Reintroduce as periodic quality checks (weekly/milestone), not per-experiment gates.

themes:
  auto:
    strategy: weighted_random
    cooldown_per_theme: 3
    priorities:
      test_coverage: 1
      skill_quality: 3        # improve SKILL.md descriptions, examples, triggers
      agent_prompts: 2        # improve agent instructions for better accuracy
      command_docs: 1         # improve command descriptions and argument hints
      refactoring: 1
      execution_clarity: 2   # improve prompts/docs for unambiguous execution (Haiku compatibility)
      # TODO: add haiku_compatibility_score benchmark once #53 spike results are available
      # skill_effectiveness REMOVED (2026-03-30): no focus_paths defined,
      # dependent benchmarks (ar/matrix-effectiveness) are LLM-based and too
      # slow/expensive for per-experiment evaluation. Caused Run 10 "unknown" cascade.
    focus_paths:
      test_coverage:
        - "test/**"
        - "scripts/*.sh"
      skill_quality:
        - "skills/*/SKILL.md"
      agent_prompts:
        - "agents/*.md"
      command_docs:
        - "commands/*.md"
      refactoring:
        - "scripts/**"
        - "skills/run/references/*.md"
      execution_clarity:
        - "skills/run/references/loop.md"
        - "skills/run/SKILL.md"
        - "agents/experimenter.md"
        - "agents/proposer.md"
        - "agents/researcher.md"

constraints:
  forbidden_paths:
    - autoimprove.yaml          # never auto-modify config
    - scripts/evaluate.sh       # gate script is sacred
    - benchmark/**              # benchmark scripts are sacred
    - .claude-plugin/**         # plugin cache — not source
    - .claude/**                # local claude config
    - package.json              # dependency manifest
    - package-lock.json
    # tests/ governed by test_modification: additive_only (not forbidden_paths)
    # skills/, commands/, agents/ are INTENTIONALLY NOT forbidden — they should evolve
  test_modification: additive_only
  trust_ratchet:
    tier_0: { max_files: 3, max_lines: 150, mode: auto_merge }
    tier_1: { max_files: 6, max_lines: 300, mode: auto_merge, after_keeps: 5 }
    tier_2: { max_files: 10, max_lines: 500, mode: auto_merge, after_keeps: 15 }

safety:
  epoch_drift_threshold: 0.05
  regression_tolerance: 0.0
  significance_threshold: 0.01
  stagnation_window: 5

xgh:
  repos:
    - extreme-go-horse/xgh
  metrics:
    - name: velocity
      description: PRs merged per sprint
      extract: "json:.merged_per_sprint"
      direction: higher_is_better
    - name: quality
      description: adversarial review findings per PR
      extract: "json:.findings_per_pr"
      direction: lower_is_better
    - name: coverage_delta
      description: test coverage change per PR (if applicable)
      extract: "json:.coverage_delta"
      direction: higher_is_better
  signal_collection:
    trigger: post-merge
    collector: scripts/autoimprove-trigger.sh
    tags:
      - "project:xgh"
      - "source:github"
  allocation: 0.20  # 20% of xgh implementations feed autoimprove pipeline


# Signal harvester — runs as step 0 before each experiment cycle.
# Reads signals, detects anomalies, feeds theme selection.
harvester:
  signal_dir: "~/.claude/signals"
  window_days: 7
  anomaly_thresholds:
    failure_rate_multiplier: 2.0
    duration_multiplier: 2.0
  severity_levels:
    critical: 5.0
    high: 3.0
    medium: 2.0
  source_theme_map:
    - pattern: "xgh:"
      theme: "retrieval-reliability"
    - pattern: "lcm:"
      theme: "memory-reliability"
    - pattern: "org:skill-"
      theme: "skill-quality"
    - pattern: "hook:"
      theme: "hook-performance"
    - pattern: "agent:"
      theme: "agent-efficiency"
