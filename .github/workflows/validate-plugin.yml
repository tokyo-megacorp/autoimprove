name: Validate Plugin

on:
  push:
    branches: [main, develop]
    paths:
      - '.claude-plugin/**'
      - 'skills/**'
      - 'commands/**'
      - 'agents/**'
      - 'scripts/**'
      - '.github/workflows/validate-plugin.yml'
  pull_request:
    paths:
      - '.claude-plugin/**'
      - 'skills/**'
      - 'commands/**'
      - 'agents/**'
      - 'scripts/**'
      - '.github/workflows/validate-plugin.yml'

permissions:
  contents: read

jobs:
  validate-plugin-json:
    name: Validate plugin.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check plugin.json exists
        run: |
          if [ ! -f ".claude-plugin/plugin.json" ]; then
            echo "ERROR: .claude-plugin/plugin.json not found"
            exit 1
          fi
          echo "OK: .claude-plugin/plugin.json exists"

      - name: Validate JSON syntax
        run: |
          if ! jq empty .claude-plugin/plugin.json 2>/dev/null; then
            echo "ERROR: .claude-plugin/plugin.json is not valid JSON"
            exit 1
          fi
          echo "OK: valid JSON"

      - name: Check required fields
        run: |
          ERRORS=0

          NAME=$(jq -r '.name // empty' .claude-plugin/plugin.json)
          if [ -z "$NAME" ]; then
            echo "ERROR: missing required field: name"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: name = $NAME"
          fi

          VERSION=$(jq -r '.version // empty' .claude-plugin/plugin.json)
          if [ -z "$VERSION" ]; then
            echo "ERROR: missing required field: version"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: version = $VERSION"
          fi

          DESCRIPTION=$(jq -r '.description // empty' .claude-plugin/plugin.json)
          if [ -z "$DESCRIPTION" ]; then
            echo "ERROR: missing required field: description"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: description present"
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS required field(s) missing"
            exit 1
          fi

  validate-components:
    name: Validate component files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate skill authoring hygiene
        run: |
          bash scripts/validate-skill-authoring.sh

      - name: Validate commands (commands/<name>.md)
        run: |
          ERRORS=0
          CMD_DIR="commands"
          if [ -d "$CMD_DIR" ]; then
            for cmd_file in "$CMD_DIR"/*.md; do
              [ -e "$cmd_file" ] || continue
              cmd_name=$(basename "$cmd_file")
              if [ ! -f "$cmd_file" ]; then
                echo "ERROR: $CMD_DIR/$cmd_name is not a file"
                ERRORS=$((ERRORS + 1))
              else
                echo "OK: $CMD_DIR/$cmd_name"
              fi
            done
          else
            echo "INFO: no $CMD_DIR directory"
          fi
          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS command file(s) invalid"
            exit 1
          fi

      # autoimprove: agents/ at repo root, each is a .md file
      - name: Validate agents (agents/<name>.md)
        run: |
          ERRORS=0
          if [ -d "agents" ]; then
            for agent_file in agents/*.md; do
              [ -e "$agent_file" ] || continue
              agent_name=$(basename "$agent_file")
              if [ ! -f "$agent_file" ]; then
                echo "ERROR: agents/$agent_name is not a file"
                ERRORS=$((ERRORS + 1))
              else
                echo "OK: agents/$agent_name"
              fi
            done
          else
            echo "INFO: no agents/ directory"
          fi
          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS agent file(s) invalid"
            exit 1
          fi

  validate-structure:
    name: Validate directory structure (anti-pattern check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ensure skills/ are NOT nested inside .claude-plugin/
        run: |
          ERRORS=0

          # autoimprove keeps skills/ at repo root.
          # Claude command files are mirrored into .claude-plugin/commands via symlinks,
          # so only skills are treated as a structural anti-pattern here.
          if [ -d ".claude-plugin/skills" ]; then
            echo "ERROR: skills/ is nested inside .claude-plugin/ — anti-pattern detected"
            echo "  Move skills to repo root skills/"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: no skills/ nested inside .claude-plugin/"
          fi

          # Check that root-level skills/ isn't duplicated inside .claude-plugin/
          if find .claude-plugin -mindepth 2 -name "SKILL.md" 2>/dev/null | grep -q .; then
            echo "ERROR: SKILL.md files found nested inside .claude-plugin/ — anti-pattern"
            find .claude-plugin -mindepth 2 -name "SKILL.md"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: no SKILL.md nested inside .claude-plugin/"
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS structural issue(s) found"
            exit 1
          fi
